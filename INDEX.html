<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#401674" />
  <link rel="icon" type="image/gif" sizes="32x32" href="https://console.adfaz.sa/assets/images/no-data/agreement.gif" />
  <title>kilany</title>
  <style>
    :root {
      --bg-dark: #020617;
      --sidebar-bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #3b82f6;
      --border: #334155;
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
      --pinned-color: #facc15;
      --danger: #ef4444;
      --success: #10b981;
      --modal-bg: #0b1222;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      transition: var(--transition);
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
    }

    .app-wrapper {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .sidebar {
      width: 350px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
    }

    .sidebar.collapsed {
      margin-right: -350px;
    }

    .toggle-handle {
      position: absolute;
      left: -35px;
      top: 15px;
      width: 35px;
      height: 35px;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-right: none;
      color: white;
      cursor: pointer;
      border-radius: 8px 0 0 8px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tabs-nav {
      display: flex;
      gap: 6px;
      padding: 10px 15px;
      background: rgba(0, 0, 0, 0.2);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      background: #161e2f;
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .tab-btn.active.completed-active {
      background: var(--success);
      border-color: var(--success);
    }

    .search-area {
      padding: 15px;
      display: flex;
      gap: 8px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: white;
      outline: none;
      font-size: 13px;
    }

    .filter-dropdown {
      position: relative;
    }

    .filter-btn {
      height: 44px;
      width: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #161e2f;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .filter-content {
      display: none;
      position: absolute;
      top: 50px;
      left: 0;
      width: 220px;
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      z-index: 1001;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .filter-content.show {
      display: block;
    }

    .filter-content label {
      display: block;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
      margin-top: 10px;
    }

    .filter-content select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: #020617;
      color: white;
      border: 1px solid var(--border);
      outline: none;
    }

    .project-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 15px 15px 15px;
      scrollbar-width: thin;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      position: relative;
      border-right: 4px solid transparent;
      animation: slideUp 0.4s ease forwards;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5);
    }

    .card.active {
      border-right-color: var(--accent);
      background: #243146;
    }

    .card.is-pinned {
      border-right-color: var(--pinned-color);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: bold;
      margin: 0;
      color: #fff;
    }

    .copy-trigger {
      opacity: 0;
      cursor: pointer;
      font-size: 14px;
      margin-right: 5px;
    }

    .card:hover .copy-trigger {
      opacity: 1;
    }

    .card .actions {
      display: flex;
      gap: 6px;
      opacity: 0;
    }

    .card:hover .actions {
      opacity: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-sm,
    .link-sm {
      background: #0f172a;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .btn-sm:hover,
    .link-sm:hover {
      color: white;
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(8px);
      padding: 20px;
    }

    .modal-inner {
      background: var(--modal-bg);
      padding: 25px;
      border-radius: 28px;
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-inner h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 20px;
      color: #fff;
    }

    .modal-inner input,
    .modal-inner select,
    .modal-inner textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: white;
      outline: none;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .close-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    #noteFormContainer {
      display: none;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(59, 130, 246, 0.05);
      border-radius: 15px;
      border: 1px dashed var(--border);
    }

    #noteFormContainer.open {
      display: block;
    }

    .plus-circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 24px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    .plus-circle:hover {
      transform: scale(1.1) rotate(90deg);
    }

    .items-container {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 5px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #161e2f;
      padding: 14px;
      border-radius: 15px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }

    .todo-item:hover {
      border-color: var(--accent);
    }

    .todo-item.done {
      opacity: 0.6;
      background: rgba(16, 185, 129, 0.05);
    }

    .todo-checkbox {
      height: 16px;
      cursor: pointer;
      accent-color: var(--success);
      width: 20px !important;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: var(--text-main);
      line-height: 1.4;
    }

    .item-row {
      background: #161e2f;
      padding: 14px;
      border-radius: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .item-row:hover {
      border-color: var(--accent);
    }

    .full-popup {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      z-index: 3000;
      display: none;
      flex-direction: column;
      animation: slideUp 0.3s ease;
    }

    .popup-header {
      height: 60px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
      }

      100% {
        transform: scale(0.95);
      }
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }

    .top-bar {
      height: 60px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 8px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    #statusLabel {
      position: fixed;
      bottom: 25px;
      left: 25px;
      background: var(--success);
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      display: none;
      z-index: 9999;
      font-size: 13px;
      font-weight: bold;
    }

    .platform-logos {
      display: flex;
      gap: 15px;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 5px 15px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }

    .logo-btn {
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .logo-btn img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 10px;
      height: 10px;
      background: var(--danger);
      border-radius: 50%;
      border: 2px solid var(--sidebar-bg);
      display: none;
    }

    .star-rating {
      display: flex;
      gap: 3px;
      margin-top: 8px;
    }

    .star {
      cursor: pointer;
      font-size: 18px;
      color: var(--text-dim);
    }

    .star.active {
      color: var(--pinned-color);
    }

    .stats-card {
      background: #161e2f;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stats-card h4 {
      margin: 0;
      font-size: 24px;
      color: var(--accent);
    }

    .stats-card p {
      margin: 5px 0 0;
      font-size: 12px;
      color: var(--text-dim);
    }
  </style>
</head>

<body>
  <div id="statusLabel">تم الحفظ ✅</div>

  <iframe id="adfazNotifFrame" src="https://console.adfaz.sa/notifications" style="display:none"></iframe>
  <iframe id="muthriNotifFrame" src="https://console.muthri.com/notifications" style="display:none"></iframe>

  <div id="toolsPopup" class="full-popup">
    <div class="popup-header">
      <div id="popupTitle" style="font-weight: bold">أدوات مساعدة</div>
      <div class="popup-tabs" id="minifyTabs" style="display: none">
        <button class="btn-sm" onclick="loadToolUrl('https://www.cleancss.com/css-minify/')">CSS Minify</button>
        <button class="btn-sm" onclick="loadToolUrl('https://minify-js.com/')">JS Minify</button>
      </div>
      <button class="btn-sm" style="background: var(--danger); color: white" onclick="closeToolPopup()">إغلاق X</button>
    </div>
    <iframe id="toolFrame" src="about:blank"></iframe>
  </div>

  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar">
      <button class="toggle-handle" onclick="toggleSidebar()" id="toggleBtn">◀</button>
      <div class="header">
        <h3 style="margin: 0; font-size: 18px">المشاريع</h3>
        <button class="btn-sm" style="background: var(--accent); color: white; border: none; padding: 8px 16px;"
          onclick="openAdd()">+ إضافة</button>
      </div>

      <div class="search-area">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="بحث في المشاريع..." onkeyup="render()" />
        </div>
        <div class="filter-dropdown">
          <button class="filter-btn" id="filterBtnToggle" onclick="toggleFilterMenu(event)">🔍</button>
          <div class="filter-content" id="filterMenu" onclick="event.stopPropagation()">
            <label>تصفية حسب المنصة:</label>
            <select id="filterPlatform" onchange="render()">
              <option value="">الكل</option>
              <option value="https://i.ibb.co/nM85mCDN/wats.png">واتساب</option>
              <option value="https://i.ibb.co/Ng9fxp5P/ad.png">أدفاز</option>
              <option value="https://i.ibb.co/XZvjN74r/muth.png">مُثري</option>
            </select>
            <label>خدمة العملاء:</label>
            <select id="filterCS" onchange="render()">
              <option value="">الكل</option>
            </select>
            <button class="close-btn" style="margin-top:15px; padding:5px; font-size:11px"
              onclick="resetFilters()">إعادة ضبط</button>
          </div>
        </div>
      </div>

      <div class="tabs-nav">
        <button class="tab-btn active" id="tabMain" onclick="switchTab('main')">جاري العمل</button>
        <button class="tab-btn" id="tabDeleted" onclick="switchTab('Deleted')">المكتملة</button>
      </div>

      <div class="project-list" id="projectList"></div>

      <div style="padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 8px;">
        <button class="btn-sm" style="flex: 1" onclick="exportData()">📥 تصدير</button>
        <button class="btn-sm" style="flex: 1" onclick="importData()">📤 استيراد</button>
      </div>
    </aside>

    <main class="main">
      <header class="top-bar">
        <div style="flex: 1; display: flex; align-items: center; gap: 15px">
          <div
            style="width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981;">
          </div>
          <strong id="currentName">اختر مشروعاً</strong>
          <div class="platform-logos">
            <div class="logo-btn"
              onclick="openInternalLink('https://console.adfaz.sa/notifications', 'إشعارات أدفاز', 'adfaz')">
              <img src="https://i.ibb.co/Ng9fxp5P/ad.png" alt="Adfaz"><span id="adfazBadge" class="notif-badge"></span>
            </div>
            <div class="logo-btn"
              onclick="openInternalLink('https://console.muthri.com/notifications', 'إشعارات مثري', 'muthri')">
              <img src="https://i.ibb.co/XZvjN74r/muth.png" alt="Muthri"><span id="muthriBadge"
                class="notif-badge"></span>
            </div>
          </div>
          <div class="dropdown" style="position:relative">
            <button class="btn-sm" onclick="toggleToolsMenu(event)">🛠️ أدوات</button>
            <div class="filter-content" id="toolsMenu" style="width:160px; left:auto; right:0"
              onclick="event.stopPropagation()">
              <button class="btn-sm" style="width:100%; margin-bottom:8px"
                onclick="openTool('hostinger')">Hostinger</button>
              <button class="btn-sm" style="width:100%; margin-bottom:8px" onclick="openTool('minify')">Minify
                Tools</button>
              <button class="btn-sm" style="width:100%" onclick="openTool('pdf')">Image to PDF</button>
              <button class="btn-sm" style="width:100%; margin-top:8px" onclick="openTool('img')">Upload Image</button>
            </div>
          </div>
        </div>
        <button class="btn-sm" onclick="openStatsModal()" style="color:var(--pinned-color)">⭐ التقييمات</button>
        <button class="btn-sm" onclick="openNotesModal()">📝 الملاحظات</button>
        <button class="btn-sm" onclick="openTodoModal()">✅ المهام</button>
        <button class="btn-sm" onclick="refresh()">🔄</button>
      </header>
      <iframe id="mainFrame" name="mainFrame" src="about:blank"></iframe>
    </main>
  </div>

  <div class="modal" id="pModal" onclick="closeOnOutside(event, 'pModal')">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <h3 id="modalTitle">بيانات المشروع</h3>
      <input type="hidden" id="editId" />
      <input type="text" id="pName" placeholder="اسم المشروع" />
      <input type="url" id="pUrl" placeholder="رابط المشروع (https://...)" />
      <input type="url" id="pStoreUrl" placeholder="رابط المتجر" />
      <div class="row" style="margin-bottom: 12px">
        <select id="pContainer" style="margin-bottom: 0">
          <option value="">تلقائي (بدون حاوية)</option>
        </select>
        <div
          style="display: flex; align-items: center; gap: 8px; color: var(--success); font-weight: bold; font-size: 13px;">
          <input type="checkbox" id="pIsOnline" style="width: 18px; height: 18px; margin: 0" /> مشحون
        </div>
      </div>
      <div class="row">
        <select id="pContact" style="margin-bottom: 12px">
          <option value="">نوع المنصة</option>
          <option value="https://i.ibb.co/nM85mCDN/wats.png">واتساب</option>
          <option value="https://i.ibb.co/Ng9fxp5P/ad.png">أدفاز</option>
          <option value="https://i.ibb.co/XZvjN74r/muth.png">مُثري</option>
        </select>
        <input type="text" id="pCS" placeholder="خدمة العملاء" style="margin-bottom: 12px" />
      </div>
      <div class="row">
        <input type="text" id="pEmail" placeholder="الايميل" />
        <input type="text" id="pPass" placeholder="كلمة السر" />
      </div>
      <textarea id="pNotes" placeholder="ملاحظات سريعة..." rows="3"></textarea>
      <button class="save-btn" onclick="save()">حفظ البيانات</button>
      <button class="close-btn" onclick="closeModal('pModal')">إلغاء</button>
    </div>
  </div>

  <div class="modal" id="statsModal" onclick="closeOnOutside(event, 'statsModal')">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <h3 style="color: var(--pinned-color);">مركز تقييم الأداء</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="stats-card">
          <h4 id="totalRating">0</h4>
          <p>إجمالي التقييم</p>
        </div>
        <div class="stats-card">
          <h4 id="monthlyRating">0</h4>
          <p>تقييم الشهر الحالي</p>
        </div>
      </div>
      <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px;">
        <label style="font-size: 12px; color: var(--accent); display: block; margin-bottom: 8px;">تقييم فترة
          مخصصة:</label>
        <div class="row">
          <input type="date" id="statsFrom" onchange="calcCustomStats()">
          <input type="date" id="statsTo" onchange="calcCustomStats()">
        </div>
        <div id="customRatingResult"
          style="text-align: center; margin-top: 10px; font-weight: bold; color: var(--success);">اختر التاريخ</div>
      </div>
      <button class="save-btn" style="background: var(--danger); margin-bottom: 10px"
        onclick="toggleNegativeRatings()">عرض التقييم السلبي</button>
      <div id="negativeList"
        style="display:none; max-height: 150px; overflow-y: auto; background: rgba(239, 68, 68, 0.1); border-radius: 10px; padding: 10px;">
      </div>
      <button class="close-btn" onclick="closeModal('statsModal')">إغلاق</button>
    </div>
  </div>

  <div class="modal" id="notesModal" onclick="closeOnOutside(event, 'notesModal')">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <h3 style="color: white; border-bottom: 1px solid var(--border); padding-bottom: 15px;">مفكرة الملاحظات</h3>
      <button class="plus-circle" id="toggleNoteFormBtn" onclick="toggleNoteForm()">+</button>
      <div id="noteFormContainer">
        <input type="hidden" id="noteEditIdx" value="-1" />
        <input type="text" id="newNoteTitle" placeholder="عنوان الملاحظة" />
        <textarea id="newNoteText" placeholder="محتوى الملاحظة" rows="3"></textarea>
        <button class="save-btn" style="background: var(--success); margin-bottom: 5px"
          onclick="saveNote()">حفظ</button>
      </div>
      <div id="notesList" class="items-container"></div>
      <button class="close-btn" onclick="closeModal('notesModal')">إغلاق</button>
    </div>
  </div>

  <div class="modal" id="todoModal" onclick="closeOnOutside(event, 'todoModal')">
    <div class="modal-inner" onclick="event.stopPropagation()">
      <h3 style="color: white;">قائمة المهام</h3>
      <div id="todoList" class="items-container"></div>
      <div class="row" style="margin-top: 10px; background:#020617; padding:12px; border-radius:18px">
        <input type="text" id="todoInput" placeholder="أضف مهمة جديدة..." onkeypress="if(event.key==='Enter') addTodo()"
          style="margin-bottom: 0; border:none" />
        <button class="btn-sm"
          style="background: var(--accent); color: white; height: 40px; border-radius:12px; padding: 0 15px;"
          onclick="addTodo()">إضافة</button>
      </div>
      <button class="close-btn" style="margin-top: 15px" onclick="closeModal('todoModal')">إغلاق</button>
    </div>
  </div>

  <script>
    const SPECIAL_STORE_URL = "https://store.lak.sa";
    let projects = [];
    let globalNotes = JSON.parse(localStorage.getItem("global_notes_v2")) || [];
    let todoList = JSON.parse(localStorage.getItem("todo_list")) || [];
    let currentTab = "main";
    let currentUrl = "";

    setInterval(() => {
      checkNotifs('adfazNotifFrame', 'adfazBadge');
      checkNotifs('muthriNotifFrame', 'muthriBadge');
    }, 5000);

    function checkNotifs(frameId, badgeId) {
      try {
        const frame = document.getElementById(frameId);
        const badge = document.getElementById(badgeId);
        if (frame.contentDocument) {
          const hasUnread = frame.contentDocument.body.innerText.includes('غير مقروء') || frame.contentDocument.title.includes('(');
          badge.style.display = hasUnread ? 'block' : 'none';
        }
      } catch (e) { }
    }

    function openInternalLink(url, title, type) {
      document.getElementById("mainFrame").src = url;
      document.getElementById("currentName").innerText = title;
      document.getElementById(type + 'Badge').style.display = 'none';
      currentUrl = url;
    }

    const contSelect = document.getElementById("pContainer");
    for (let i = 1; i <= 15; i++) {
      let opt = document.createElement("option");
      opt.value = i; opt.innerText = `حاوية رقم ${i}`;
      contSelect.appendChild(opt);
    }

    function showStatus(txt = "تم الحفظ بنجاح ✅") {
      const label = document.getElementById("statusLabel");
      label.innerText = txt; label.style.display = "block";
      setTimeout(() => (label.style.display = "none"), 2000);
    }

    function toggleSidebar() {
      const sb = document.getElementById("sidebar");
      sb.classList.toggle("collapsed");
      document.getElementById("toggleBtn").innerText = sb.classList.contains("collapsed") ? "▶" : "◀";
    }

    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    function closeOnOutside(e, id) { if (e.target.id === id) closeModal(id); }

    function toggleToolsMenu(e) {
      e.stopPropagation();
      document.getElementById('toolsMenu').classList.toggle('show');
      document.getElementById('filterMenu').classList.remove('show');
    }

    function openTool(type) {
      const popup = document.getElementById("toolsPopup");
      const frame = document.getElementById("toolFrame");
      const tabs = document.getElementById("minifyTabs");
      popup.style.display = "flex";
      document.getElementById('toolsMenu').classList.remove('show');
      if (type === "hostinger") {
        tabs.style.display = "none"; frame.src = "https://www.hostinger.com/eg/domain-name-search";
        document.getElementById("popupTitle").innerText = "Hostinger - Domain Search";
      } else if (type === "minify") {
        tabs.style.display = "flex"; frame.src = "https://www.cleancss.com/css-minify/";
        document.getElementById("popupTitle").innerText = "Minify Tools";
      } else if (type === "pdf") {
        tabs.style.display = "none"; frame.src = "https://www.ilovepdf.com/jpg_to_pdf";
        document.getElementById("popupTitle").innerText = "Image to PDF";
      } else if (type === "img") {
        tabs.style.display = "none"; frame.src = "https://freeimage.host/";
        document.getElementById("popupTitle").innerText = "Upload Image";
      }
    }

    function loadToolUrl(url) { document.getElementById("toolFrame").src = url; }
    function closeToolPopup() {
      document.getElementById("toolsPopup").style.display = "none";
      document.getElementById("toolFrame").src = "about:blank";
    }

    function toggleFilterMenu(e) {
      e.stopPropagation();
      document.getElementById('filterMenu').classList.toggle('show');
      document.getElementById('toolsMenu').classList.remove('show');
    }

    function resetFilters() {
      document.getElementById('filterPlatform').value = "";
      document.getElementById('filterCS').value = "";
      render();
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.filter-content') && !e.target.closest('.filter-btn') && !e.target.closest('.btn-sm')) {
        document.getElementById('filterMenu').classList.remove('show');
        document.getElementById('toolsMenu').classList.remove('show');
      }
    });

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tabMain").classList.toggle("active", tab === "main");
      document.getElementById("tabDeleted").classList.toggle("active", tab === "Deleted");
      document.getElementById("tabDeleted").classList.toggle("completed-active", tab === "Deleted");
      loadFromStorage();
    }

    function loadFromStorage() {
      const key = currentTab === "main" ? "projects_main" : "projects_deleted";
      projects = (JSON.parse(localStorage.getItem(key)) || []).map((p) => ({
        ...p, id: parseInt(p.id), isPinned: p.isPinned === true,
        isOnline: p.isOnline === true, rating: p.rating || 0
      }));
      updateCSFilter(); render();
    }

    function updateCSFilter() {
      const csSelect = document.getElementById('filterCS');
      const currentVal = csSelect.value;
      const names = [...new Set(projects.map(p => p.cs).filter(Boolean))];
      csSelect.innerHTML = '<option value="">الكل</option>';
      names.forEach(n => {
        const opt = document.createElement('option'); opt.value = n; opt.innerText = n;
        csSelect.appendChild(opt);
      });
      csSelect.value = currentVal;
    }

    function saveToStorage() {
      const key = currentTab === "main" ? "projects_main" : "projects_deleted";
      localStorage.setItem(key, JSON.stringify(projects));
      showStatus();
    }

    function getPlatformName(imgUrl) {
      if (imgUrl.includes('ad.png')) return "منصة أدفاز";
      if (imgUrl.includes('muth.png')) return "منصة مُثري";
      if (imgUrl.includes('wats.png')) return "واتساب";
      return "منصة أدفاز";
    }

    function copyToClipboard(p) {
      const domain = p.url ? new URL(p.url).hostname.replace("www.", "") : "";
      const platform = p.contactImg ? getPlatformName(p.contactImg) : "منصة أدفاز";
      const text = `${p.name}\n${platform}\n${p.email || ""}\n${p.pass || ""}\n${domain}`;
      navigator.clipboard.writeText(text).then(() => showStatus("تم نسخ البيانات بنجاح 📋"));
    }

    function generateStars(pId, currentRating) {
      let starsHtml = '<div class="star-rating">';
      for (let i = 1; i <= 5; i++) {
        starsHtml += `<span class="star ${i <= currentRating ? 'active' : ''}" onclick="event.stopPropagation(); setRating(${pId}, ${i})">★</span>`;
      }
      starsHtml += '</div>';
      return starsHtml;
    }

    function setRating(pId, val) {
      const idx = projects.findIndex(p => p.id === pId);
      if (idx !== -1) {
        projects[idx].rating = projects[idx].rating === val ? 0 : val;
        saveToStorage(); render();
      }
    }

    function render() {
      const list = document.getElementById("projectList");
      const search = document.getElementById("searchInput").value.toLowerCase();
      const fPlatform = document.getElementById("filterPlatform").value;
      const fCS = document.getElementById("filterCS").value;
      list.innerHTML = "";
      const sorted = [...projects].sort((a, b) => {
        if (a.isPinned !== b.isPinned) return b.isPinned - a.isPinned;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });
      sorted.filter((p) => {
        const matchSearch = p.name.toLowerCase().includes(search);
        const matchPlatform = fPlatform === "" || p.contactImg === fPlatform;
        const matchCS = fCS === "" || p.cs === fCS;
        return matchSearch && matchPlatform && matchCS;
      }).forEach((p, idx) => {
        const card = document.createElement("div");
        card.className = `card ${currentUrl === p.url ? "active" : ""} ${p.isPinned ? "is-pinned" : ""}`;
        card.style.animationDelay = `${idx * 0.05}s`;
        card.onclick = () => {
          if (p.url) {
            document.getElementById("mainFrame").src = p.url;
            document.getElementById("currentName").innerText = p.name;
            currentUrl = p.url; render();
          }
        };
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title-wrapper">
              ${p.isOnline ? '<span class="online-dot"></span>' : ""}
              <h4 class="card-title">${p.name}</h4>
              ${p.contactImg ? `<img src="${p.contactImg}" style="width:16px; height:16px;">` : ""}
              <span class="copy-trigger" onclick="event.stopPropagation(); copyToClipboard(${JSON.stringify(p).replace(/"/g, '&quot;')})" title="نسخ البيانات">📋</span>
            </div>
            ${p.container ? `<div style="font-size:10px; background:${getContColor(p.container)}; padding:2px 8px; border-radius:6px; color:white;">حاوية ${p.container}</div>` : ""}
          </div>
          <div style="font-size:11px; color:var(--text-dim); line-height:1.4; margin-bottom:5px">
             ${p.cs ? `👤 <b>${p.cs}</b> | ` : ""} ${p.notes || "لا توجد ملاحظات"}
          </div>
          ${currentTab === "Deleted" ? generateStars(p.id, p.rating) : ""}
          <div class="card-footer">
            <span style="font-size:10px; color:var(--text-dim)">${getTimeAgo(p.createdAt)}</span>
            <div class="actions">
              <a href="${p.storeUrl || SPECIAL_STORE_URL}" target="_blank" class="link-sm" onclick="event.stopPropagation()">🔗</a>
              <button class="btn-sm" onclick="event.stopPropagation(); togglePin(${p.id})">${p.isPinned ? "📍" : "📌"}</button>
              <button class="btn-sm" onclick="event.stopPropagation(); editProj(${p.id})">✏️</button>
              <button class="btn-sm" style="color:var(--danger)" onclick="event.stopPropagation(); delProj(${p.id})">🗑️</button>
            </div>
          </div>`;
        list.appendChild(card);
      });
    }

    function toggleNoteForm() {
      const container = document.getElementById("noteFormContainer");
      const btn = document.getElementById("toggleNoteFormBtn");
      if (container.classList.contains("open")) {
        container.classList.remove("open"); btn.innerText = "+"; btn.style.transform = "rotate(0deg)";
        document.getElementById("noteEditIdx").value = "-1";
        document.getElementById("newNoteTitle").value = ""; document.getElementById("newNoteText").value = "";
      } else {
        container.classList.add("open"); btn.innerText = "-"; btn.style.transform = "rotate(180deg)";
        document.getElementById("newNoteTitle").focus();
      }
    }

    function openNotesModal() {
      const list = document.getElementById("notesList"); list.innerHTML = "";
      document.getElementById("noteFormContainer").classList.remove("open");
      document.getElementById("toggleNoteFormBtn").innerText = "+";
      globalNotes.forEach((note, idx) => {
        const row = document.createElement("div"); row.className = "item-row";
        row.onclick = () => copyToClipboardRaw(note.text);
        row.innerHTML = `<div class="item-content" style="flex:1">
          <div class="item-title" style="font-weight:bold; margin-bottom:4px">${note.title}</div>
          <div class="item-meta" style="font-size:12px; color:var(--text-dim)">${note.text.substring(0, 40)}...</div>
        </div>
        <div class="item-actions"><span onclick="event.stopPropagation(); editNote(${idx})">✏️</span><span onclick="event.stopPropagation(); deleteNote(${idx})" style="color:var(--danger)">❌</span></div>`;
        list.appendChild(row);
      });
      document.getElementById("notesModal").style.display = "flex";
    }

    function copyToClipboardRaw(txt) { navigator.clipboard.writeText(txt).then(() => showStatus("تم نسخ الملاحظة 📝")); }

    function saveNote() {
      const title = document.getElementById("newNoteTitle").value.trim();
      const text = document.getElementById("newNoteText").value.trim();
      const editIdx = parseInt(document.getElementById("noteEditIdx").value);
      if (!title || !text) return;
      if (editIdx > -1) globalNotes[editIdx] = { title, text };
      else globalNotes.unshift({ title, text });
      localStorage.setItem("global_notes_v2", JSON.stringify(globalNotes));
      toggleNoteForm(); openNotesModal();
    }

    function editNote(idx) {
      const note = globalNotes[idx];
      document.getElementById("newNoteTitle").value = note.title;
      document.getElementById("newNoteText").value = note.text;
      document.getElementById("noteEditIdx").value = idx;
      if (!document.getElementById("noteFormContainer").classList.contains("open")) toggleNoteForm();
    }

    function deleteNote(idx) {
      if (confirm("حذف الملاحظة؟")) {
        globalNotes.splice(idx, 1);
        localStorage.setItem("global_notes_v2", JSON.stringify(globalNotes));
        openNotesModal();
      }
    }

    function openTodoModal() {
      const list = document.getElementById("todoList"); list.innerHTML = "";
      todoList.forEach((todo, idx) => {
        const item = document.createElement("div"); item.className = `todo-item ${todo.done ? 'done' : ''}`;
        item.innerHTML = `<input type="checkbox" class="todo-checkbox" ${todo.done ? "checked" : ""} onchange="toggleTodo(${idx})">
          <span class="todo-text">${todo.task}</span><span style="cursor:pointer; opacity:0.6; font-size:14px" onclick="deleteTodo(${idx})">🗑️</span>`;
        list.appendChild(item);
      });
      document.getElementById("todoModal").style.display = "flex";
    }

    function addTodo() {
      const input = document.getElementById("todoInput");
      if (!input.value.trim()) return;
      todoList.unshift({ task: input.value.trim(), done: false });
      localStorage.setItem("todo_list", JSON.stringify(todoList));
      input.value = ""; openTodoModal();
    }

    function toggleTodo(idx) {
      todoList[idx].done = !todoList[idx].done;
      localStorage.setItem("todo_list", JSON.stringify(todoList));
      openTodoModal();
    }

    function deleteTodo(idx) {
      todoList.splice(idx, 1);
      localStorage.setItem("todo_list", JSON.stringify(todoList));
      openTodoModal();
    }

    // --- Stats Logic Modified to use completedAt for Monthly/Custom ---
    function openStatsModal() {
      const delProjects = JSON.parse(localStorage.getItem("projects_deleted")) || [];
      const ratedTotal = delProjects.filter(p => (p.rating || 0) > 0);
      const totalAvg = ratedTotal.length ? (ratedTotal.reduce((acc, p) => acc + (p.rating || 0), 0) / ratedTotal.length).toFixed(1) : 0;
      document.getElementById('totalRating').innerText = totalAvg;

      const now = new Date();
      const monthly = delProjects.filter(p => {
        const dateToMeasure = p.completedAt ? new Date(p.completedAt) : new Date(p.createdAt);
        return dateToMeasure.getMonth() === now.getMonth() && dateToMeasure.getFullYear() === now.getFullYear() && (p.rating || 0) > 0;
      });
      const monthlyAvg = monthly.length ? (monthly.reduce((acc, p) => acc + (p.rating || 0), 0) / monthly.length).toFixed(1) : 0;
      document.getElementById('monthlyRating').innerText = monthlyAvg;

      const negative = delProjects.filter(p => (p.rating || 0) > 0 && (p.rating || 0) < 5);
      const negList = document.getElementById('negativeList');
      negList.innerHTML = negative.length ? negative.map(p => `<div style="font-size:12px; margin-bottom:5px;">⚠️ ${p.name} (${p.rating} نجوم)</div>`).join('') : 'لا يوجد تقييم سلبي';
      document.getElementById('statsModal').style.display = 'flex';
    }

    function calcCustomStats() {
      const from = document.getElementById('statsFrom').value;
      const to = document.getElementById('statsTo').value;
      if (!from || !to) return;
      const delProjects = JSON.parse(localStorage.getItem("projects_deleted")) || [];
      const custom = delProjects.filter(p => {
        const dateToMeasure = p.completedAt ? new Date(p.completedAt).toISOString().split('T')[0] : new Date(p.createdAt).toISOString().split('T')[0];
        return dateToMeasure >= from && dateToMeasure <= to && (p.rating || 0) > 0;
      });
      const avg = custom.length ? (custom.reduce((acc, p) => acc + (p.rating || 0), 0) / custom.length).toFixed(1) : 0;
      document.getElementById('customRatingResult').innerText = `المعدل: ${avg} من 5 (عبر ${custom.length} مشروع مقيم)`;
    }

    function toggleNegativeRatings() {
      const list = document.getElementById('negativeList');
      list.style.display = list.style.display === 'none' ? 'block' : 'none';
    }

    function save() {
      const id = document.getElementById("editId").value;
      const nameVal = document.getElementById("pName").value;
      if (!nameVal) return alert("الاسم مطلوب");
      const data = {
        name: nameVal, url: document.getElementById("pUrl").value,
        storeUrl: document.getElementById("pStoreUrl").value,
        container: document.getElementById("pContainer").value,
        isOnline: document.getElementById("pIsOnline").checked,
        contactImg: document.getElementById("pContact").value,
        cs: document.getElementById("pCS").value,
        email: document.getElementById("pEmail").value,
        pass: document.getElementById("pPass").value,
        notes: document.getElementById("pNotes").value,
      };
      if (id) {
        const idx = projects.findIndex((x) => x.id == id);
        if (idx !== -1) projects[idx] = { ...projects[idx], ...data };
      } else {
        projects.push({ ...data, id: Date.now(), isPinned: false, createdAt: new Date().toISOString(), rating: 0 });
      }
      saveToStorage(); updateCSFilter(); closeModal("pModal"); render();
    }

    function editProj(id) {
      const p = projects.find((x) => x.id === id);
      document.getElementById("editId").value = p.id;
      document.getElementById("pName").value = p.name;
      document.getElementById("pUrl").value = p.url;
      document.getElementById("pStoreUrl").value = p.storeUrl || "";
      document.getElementById("pContainer").value = p.container || "";
      document.getElementById("pIsOnline").checked = p.isOnline || false;
      document.getElementById("pContact").value = p.contactImg || "";
      document.getElementById("pCS").value = p.cs || "";
      document.getElementById("pEmail").value = p.email || "";
      document.getElementById("pPass").value = p.pass || "";
      document.getElementById("pNotes").value = p.notes || "";
      document.getElementById("modalTitle").innerText = "تعديل المشروع";
      document.getElementById("pModal").style.display = "flex";
    }

    function delProj(id) {
      if (confirm("حذف المشروع؟ سيتم نقله للمكتملة وتفريغ الملاحظة")) {
        const idx = projects.findIndex((x) => x.id === id);
        if (currentTab === "main") {
          const del = JSON.parse(localStorage.getItem("projects_deleted")) || [];
          let movedProj = { ...projects[idx] };
          movedProj.notes = "";
          movedProj.completedAt = new Date().toISOString(); // تسجيل تاريخ الانتقال للمكتملة
          del.push(movedProj);
          localStorage.setItem("projects_deleted", JSON.stringify(del));
        }
        projects.splice(idx, 1); saveToStorage(); render();
      }
    }

    function togglePin(id) {
      const p = projects.find((x) => x.id === id);
      p.isPinned = !p.isPinned; saveToStorage(); render();
    }

    function openAdd() {
      document.getElementById("editId").value = "";
      document.getElementById("pModal").querySelectorAll("input, textarea").forEach((i) => (i.value = ""));
      document.getElementById("pIsOnline").checked = false;
      document.getElementById("pContact").value = "";
      document.getElementById("modalTitle").innerText = "مشروع جديد";
      document.getElementById("pModal").style.display = "flex";
    }

    function refresh() {
      if (currentUrl) document.getElementById("mainFrame").src = currentUrl;
      loadFromStorage();
    }

    function getContColor(n) { return ["#ef4444", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899", "#06b6d4"][(n - 1) % 7]; }

    function getTimeAgo(date) {
      if (!date) return "";
      const sec = Math.floor((new Date() - new Date(date)) / 1000);
      if (sec < 60) return "الآن";
      return sec < 3600 ? `منذ ${Math.floor(sec / 60)} د` : sec < 86400 ? `منذ ${Math.floor(sec / 3600)} س` : new Date(date).toLocaleDateString("ar-EG");
    }

    function exportData() {
      const blob = new Blob([JSON.stringify({
        main: JSON.parse(localStorage.getItem("projects_main")),
        deleted: JSON.parse(localStorage.getItem("projects_deleted")),
        notes: globalNotes, todos: todoList,
      }, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `backup_${new Date().toISOString().split("T")[0]}.json`;
      a.click();
    }

    function importData() {
      const input = document.createElement("input");
      input.type = "file";
      input.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.main) localStorage.setItem("projects_main", JSON.stringify(data.main));
            if (data.deleted) localStorage.setItem("projects_deleted", JSON.stringify(data.deleted));
            if (data.notes) { globalNotes = data.notes; localStorage.setItem("global_notes_v2", JSON.stringify(globalNotes)); }
            if (data.todos) { todoList = data.todos; localStorage.setItem("todo_list", JSON.stringify(todoList)); }
            alert("تمت استعادة كافة البيانات بنجاح"); location.reload();
          } catch (err) { alert("ملف غير صالح"); }
        };
        reader.readAsText(e.target.files[0]);
      };
      input.click();
    }

    switchTab("main");
  </script>
</body>

</html>
