<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف المقالات | Muthri & Advaz</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508;
            --card: #0c121e;
            --muthri: #00ffa3;
            --advaz: #bd00ff;
            --accent: #00ffa3;
            --text: #f1f5f9;
            --dim: #64748b;
            --transition: all 0.3s ease;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
        }

        /* Header */
        header {
            background: rgba(12, 18, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-link {
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Controls */
        .controls {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            gap: 15px;
        }

        .search-input {
            flex: 1;
            background: var(--card);
            border: 1px solid #1e293b;
            padding: 12px;
            border-radius: 10px;
            color: #fff;
        }

        /* Grid & Cards */
        .container {
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .media-box {
            height: 200px;
            width: 100%;
            background: #000;
        }

        .media-box img,
        .media-box video,
        .media-box iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .card-body {
            padding: 20px;
        }

        .badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .muthri-bg {
            background: rgba(0, 255, 163, 0.1);
            color: var(--muthri);
        }

        .advaz-bg {
            background: rgba(189, 0, 255, 0.1);
            color: var(--advaz);
        }

        /* Admin Tools */
        .admin-controls {
            position: absolute;
            top: 10px;
            left: 10px;
            display: none;
            gap: 5px;
        }

        body.is-admin .admin-controls {
            display: flex;
        }

        .btn-tool {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: none;
        }

        .btn-tool.edit:hover {
            background: var(--muthri);
            color: #000;
        }

        .btn-tool.del:hover {
            background: #ff4757;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        #desc-content {
            white-space: pre-wrap;
            line-height: 1.7;
            color: #ccc;
        }
    </style>
</head>

<body id="mainBody">

    <header>
        <a href="index.html" class="back-link"><i class="fas fa-chevron-right"></i> العودة للرئيسية</a>
        <h3 style="margin:0">كل المقالات</h3>
    </header>

    <div class="controls">
        <input type="text" class="search-input" id="search" placeholder="ابحث بالعنوان..." onkeyup="filter()">
        <select id="filterType" onchange="filter()"
            style="background:var(--card); color:white; border-radius:10px; padding:0 10px;">
            <option value="all">الكل</option>
            <option value="muthri">مُثري</option>
            <option value="advaz">أدفاز</option>
        </select>
    </div>

    <div class="container">
        <div class="grid" id="container"></div>
    </div>

    <div class="modal" id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-media" style="margin-bottom:20px"></div>
            <h2 id="modal-title"></h2>
            <div id="desc-content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBMUqKSQwHBFEi3HCRhBm4cGa3wP2FUMMU",
            authDomain: "muthri-advaz-portal.firebaseapp.com",
            projectId: "muthri-advaz-portal",
            storageBucket: "muthri-advaz-portal.firebasestorage.app",
            messagingSenderId: "284717348325",
            appId: "1:284717348325:web:8ef1bac8ef9639ff34ab0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let articles = [];
        const isAdmin = localStorage.getItem('isAdmin') === 'true';
        if (isAdmin) document.getElementById('mainBody').classList.add('is-admin');

        async function fetchArticles() {
            const snap = await db.collection('articles').orderBy('order', 'asc').get();
            articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render(articles);
        }

        function renderMedia(url) {
            if (!url) return '';
            if (url.includes('youtube') || url.includes('youtu.be')) {
                let id = url.split('v=')[1] || url.split('/').pop();
                return `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
            }
            return `<img src="${url}" loading="lazy">`;
        }

        function render(data) {
            const container = document.getElementById('container');
            container.innerHTML = data.map(art => {
                const dataStr = encodeURIComponent(JSON.stringify({ id: art.id, data: art }));
                return `
                <div class="card">
                    <div class="admin-controls">
                        <button class="btn-tool edit" onclick="goToEdit('${dataStr}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-tool del" onclick="deleteArt('${art.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="media-box">${renderMedia(art.img)}</div>
                    <div class="card-body">
                        <span class="badge ${art.type === 'muthri' ? 'muthri-bg' : 'advaz-bg'}">${art.type}</span>
                        <h4>${art.title}</h4>
                        <button onclick="showFull('${art.title}', '${art.img}', '${encodeURIComponent(art.desc)}')" style="width:100%; background:transparent; border:1px solid #333; color:white; padding:8px; border-radius:8px; cursor:pointer;">تفاصيل</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            const t = document.getElementById('filterType').value;
            const filtered = articles.filter(a =>
                a.title.toLowerCase().includes(q) && (t === 'all' || a.type === t)
            );
            render(filtered);
        }

        function showFull(t, m, d) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-media').innerHTML = renderMedia(m);
            document.getElementById('desc-content').innerText = decodeURIComponent(d);
            document.getElementById('modal').style.display = 'flex';
        }

        // الوظيفة الأساسية لإرسال التعديل
        function goToEdit(dataStr) {
            // نؤكد على حفظ حالة الأدمن قبل الانتقال
            localStorage.setItem('isAdmin', 'true');
            localStorage.setItem('editTarget', dataStr);
            window.location.href = 'index.html?action=edit';
        }

        async function deleteArt(id) {
            if (confirm('حذف نهائي؟')) {
                await db.collection('articles').doc(id).delete();
                fetchArticles();
            }
        }

        window.onload = fetchArticles;
    </script>
</body>

</html>
