<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muthri & Advaz | Ultra Management Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030508;
            --card: #0c121e;
            --muthri: #00ffa3;
            --advaz: #bd00ff;
            --accent: var(--muthri);
            --text: #f1f5f9;
            --dim: #64748b;
            --sidebar-w: 380px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 9999;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Overlay for Sidebar */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 1500;
        }

        nav {
            background: rgba(3, 5, 8, 0.85);
            backdrop-filter: blur(15px);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .brand-switcher {
            display: flex;
            background: #000;
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .b-btn {
            border: none;
            background: none;
            color: var(--dim);
            padding: 9px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            font-size: 13px;
        }

        .b-btn.active.m {
            background: var(--muthri);
            color: #000;
        }

        .b-btn.active.a {
            background: var(--advaz);
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-header {
            color: var(--accent);
            margin: 50px 0 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            transition: var(--transition);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
        }

        .media-wrap {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
            position: relative;
        }

        .media-wrap img,
        .media-wrap video,
        .media-wrap iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            font-size: 14px;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .link-item img {
            width: 22px;
            height: 22px;
        }

        #admin-sidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: var(--sidebar-w);
            height: 100%;
            background: #06090f;
            z-index: 2000;
            transition: var(--transition);
            box-shadow: 30px 0 60px rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            padding: 20px;
        }

        #admin-sidebar.open {
            left: 0;
        }

        .sidebar-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 15px;
        }

        .acc-group {
            margin-bottom: 12px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1e293b;
        }

        .acc-head {
            width: 100%;
            padding: 18px;
            background: #111827;
            border: none;
            color: #fff;
            text-align: right;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            font-family: inherit;
        }

        .acc-body {
            padding: 20px;
            display: none;
            background: #0a0f18;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: #161e2e;
            border: 1px solid #2d3748;
            color: #fff;
            border-radius: 12px;
            font-family: inherit;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .copy-box {
            background: #000;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            margin-top: 6px;
            border: 1px solid #1e293b;
            font-size: 13px;
            color: #cbd5e1;
        }

        .admin-tools {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .tool-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.7);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card);
            max-width: 700px;
            width: 100%;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Fix description text format */
        #modal-desc {
            white-space: pre-wrap;
            line-height: 1.8;
            color: var(--dim);
        }

        .view-all-btn {
            display: none;
            margin: 40px auto;
            padding: 15px 40px;
            background: none;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .view-all-btn:hover {
            background: var(--accent);
            color: #000;
        }

        @media (max-width: 768px) {
            :root {
                --sidebar-w: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="toast"><i class="fas fa-check-circle"></i> <span id="toast-msg">تم النسخ</span></div>
    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="article-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i class="fas fa-times" onclick="closeModal()"
                style="position:absolute; top:20px; left:20px; cursor:pointer; font-size:20px; z-index:100"></i>
            <div id="modal-data"></div>
        </div>
    </div>

    <nav>
        <div class="brand-switcher">
            <button class="b-btn active m" id="brand-muthri" onclick="changeBrand('muthri')">مُثري</button>
            <button class="b-btn a" id="brand-advaz" onclick="changeBrand('advaz')">أدفاز</button>
        </div>
        <button onclick="toggleSidebar()"
            style="background:none; border:1px solid var(--accent); color:var(--accent); padding:10px 22px; border-radius:50px; cursor:pointer; font-weight:700">التحكم</button>
    </nav>

    <div class="container">
        <h2 class="section-header"><i class="fas fa-link"></i> الروابط</h2>
        <div class="links-grid" id="links-container"></div>

        <h2 class="section-header"><i class="fas fa-play-circle"></i> المحتوى المرئي والمقالات</h2>
        <div class="grid" id="articles-container"></div>
        <center><button id="btn-show-all" class="view-all-btn" onclick="location.href='all_articles.html'">عرض
                الكل</button></center>

        <h2 class="section-header"><i class="fas fa-users-cog"></i> بيانات الموردين</h2>
        <div class="grid" id="suppliers-container"></div>
    </div>

    <div id="admin-sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0">Dashboard</h2><i class="fas fa-times" onclick="toggleSidebar()"
                style="cursor:pointer"></i>
        </div>

        <div id="login-section">
            <input type="text" id="adm-user" class="form-input" placeholder="User">
            <input type="password" id="adm-pass" class="form-input" placeholder="Password">
            <button class="btn-save" onclick="handleLogin()">دخول</button>
        </div>

        <div id="cms-section" style="display:none">
            <div class="acc-group">
                <button class="acc-head" onclick="toggleAcc('acc-links')">الروابط <i class="fas fa-plus"></i></button>
                <div class="acc-body" id="acc-links">
                    <input type="hidden" id="f-l-id">
                    <input type="text" id="f-l-title" class="form-input" placeholder="العنوان">
                    <input type="text" id="f-l-url" class="form-input" placeholder="الرابط">
                    <input type="text" id="f-l-icon" class="form-input" placeholder="الأيقونة">
                    <input type="number" id="f-l-order" class="form-input" placeholder="الترتيب">
                    <button class="btn-save" onclick="processSave('links')">حفظ</button>
                </div>
            </div>
            <div class="acc-group">
                <button class="acc-head" onclick="toggleAcc('acc-arts')">المقالات والفيديو <i
                        class="fas fa-plus"></i></button>
                <div class="acc-body" id="acc-arts">
                    <input type="hidden" id="f-a-id">
                    <input type="text" id="f-a-title" class="form-input" placeholder="العنوان">
                    <input type="text" id="f-a-img" class="form-input" placeholder="رابط الميديا">
                    <textarea id="f-a-desc" class="form-input" style="height:100px" placeholder="الوصف"></textarea>
                    <input type="number" id="f-a-order" class="form-input" placeholder="الترتيب">
                    <button class="btn-save" onclick="processSave('articles')">حفظ</button>
                </div>
            </div>
            <div class="acc-group">
                <button class="acc-head" onclick="toggleAcc('acc-sups')">الموردين <i class="fas fa-plus"></i></button>
                <div class="acc-body" id="acc-sups">
                    <input type="hidden" id="f-s-id">
                    <input type="text" id="f-s-name" class="form-input" placeholder="الشركة">
                    <input type="text" id="f-s-img" class="form-input" placeholder="اللوجو">
                    <input type="text" id="f-s-cid" class="form-input" placeholder="Client ID">
                    <input type="text" id="f-s-sec" class="form-input" placeholder="Secret Key">
                    <textarea id="f-s-note" class="form-input" placeholder="الملاحظات"></textarea>
                    <input type="number" id="f-s-order" class="form-input" placeholder="الترتيب">
                    <button class="btn-save" onclick="processSave('suppliers')">حفظ</button>
                </div>
            </div>
            <button onclick="handleLogout()"
                style="background:none; color:#fb7185; border:1px solid #fb7185; margin-top:20px"
                class="btn-save">خروج</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBMUqKSQwHBFEi3HCRhBm4cGa3wP2FUMMU",
            authDomain: "muthri-advaz-portal.firebaseapp.com",
            projectId: "muthri-advaz-portal",
            storageBucket: "muthri-advaz-portal.firebasestorage.app",
            messagingSenderId: "284717348325",
            appId: "1:284717348325:web:8ef1bac8ef9639ff34ab0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تحديث حالة تسجيل الدخول من التخزين المحلي فوراً
        let currentBrand = 'muthri';
        let isLogged = localStorage.getItem('isAdmin') === 'true';

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        function renderMedia(url) {
            if (!url) return '<div class="media-wrap"></div>';
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let id = url.split('v=')[1] || url.split('/').pop();
                return `<iframe src="https://www.youtube.com/embed/${id.split('&')[0]}" allowfullscreen></iframe>`;
            }
            if (url.includes('catbox.moe') || url.match(/\.(mp4|webm|mov)$/)) {
                return `<video controls preload="metadata" playsinline><source src="${url}" type="video/mp4"></video>`;
            }
            return `<img src="${url}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x200'">`;
        }

        function changeBrand(b) {
            currentBrand = b;
            document.querySelectorAll('.b-btn').forEach(btn => btn.classList.remove('active'));
            const targetBtn = document.getElementById(`brand-${b}`);
            if (targetBtn) targetBtn.classList.add('active');
            document.documentElement.style.setProperty('--accent', b === 'muthri' ? '#00ffa3' : '#bd00ff');
            refreshUI();
        }

        async function refreshUI() {
            const getCol = async (n) => {
                const s = await db.collection(n).orderBy('order', 'asc').get();
                return s.docs.filter(d => n === 'links' ? true : d.data().type === currentBrand);
            };

            // Links
            const links = await getCol('links');
            document.getElementById('links-container').innerHTML = links.map(doc => `
                <div style="position:relative">
                    <a href="${doc.data().url}" target="_blank" class="link-item"><img src="${doc.data().icon}"> ${doc.data().title}</a>
                    ${isLogged ? drawTools('links', doc) : ''}
                </div>`).join('');

            // Articles (Limit 3)
            const arts = await getCol('articles');
            const displayArts = arts.slice(0, 3);
            const btnShowAll = document.getElementById('btn-show-all');
            if (btnShowAll) btnShowAll.style.display = arts.length > 3 ? 'block' : 'none';

            document.getElementById('articles-container').innerHTML = displayArts.map(doc => {
                const d = doc.data();
                return `<div class="card">
                    ${isLogged ? drawTools('articles', doc) : ''}
                    <div class="media-wrap">${renderMedia(d.img)}</div>
                    <h3>${d.title}</h3>
                    <button onclick="viewFull('${d.title}', '${d.img}', '${encodeURIComponent(d.desc)}')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:700; font-family:inherit;">التفاصيل</button>
                </div>`;
            }).join('');

            // Suppliers
            const sups = await getCol('suppliers');
            document.getElementById('suppliers-container').innerHTML = sups.map(doc => {
                const d = doc.data();
                return `<div class="card">
                    ${isLogged ? drawTools('suppliers', doc) : ''}
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px">
                        <img src="${d.image}" style="width:45px; height:45px; border-radius:10px; object-fit:cover">
                        <h3 style="margin:0">${d.name}</h3>
                    </div>
                    <div style="font-size:10px; color:var(--dim)">CLIENT ID</div>
                    <div class="copy-box"><span>${d.cid}</span><i class="far fa-copy" onclick="copyText('${d.cid}')"></i></div>
                    <div style="font-size:10px; color:var(--dim); margin-top:10px">SECRET KEY</div>
                    <div class="copy-box"><span>${d.sec || '---'}</span><i class="far fa-copy" onclick="copyText('${d.sec}')"></i></div>
                    ${d.note ? `<div style="margin-top:15px; padding:12px; background:rgba(255,255,255,0.02); border-right:3px solid var(--accent); font-size:13px; color:var(--dim); border-radius:8px; white-space:pre-wrap;">${d.note}</div>` : ''}
                </div>`;
            }).join('');
        }

        async function processSave(coll) {
            let p = { type: currentBrand, order: 0 }, id = document.getElementById(coll === 'links' ? 'f-l-id' : coll === 'articles' ? 'f-a-id' : 'f-s-id').value;
            if (coll === 'links') p = { title: document.getElementById('f-l-title').value, url: document.getElementById('f-l-url').value, icon: document.getElementById('f-l-icon').value, order: Number(document.getElementById('f-l-order').value) };
            else if (coll === 'articles') p = { ...p, title: document.getElementById('f-a-title').value, img: document.getElementById('f-a-img').value, desc: document.getElementById('f-a-desc').value, order: Number(document.getElementById('f-a-order').value) };
            else p = { ...p, name: document.getElementById('f-s-name').value, image: document.getElementById('f-s-img').value, cid: document.getElementById('f-s-cid').value, sec: document.getElementById('f-s-sec').value, note: document.getElementById('f-s-note').value, order: Number(document.getElementById('f-s-order').value) };

            id ? await db.collection(coll).doc(id).update(p) : await db.collection(coll).add(p);
            showToast("تم الحفظ"); clearInputs(); refreshUI(); toggleSidebar();
        }

        function editItem(coll, dataStr) {
            const d = JSON.parse(decodeURIComponent(dataStr));
            toggleAcc(coll === 'links' ? 'acc-links' : coll === 'articles' ? 'acc-arts' : 'acc-sups', true);

            const sidebar = document.getElementById('admin-sidebar');
            if (sidebar && !sidebar.classList.contains('open')) toggleSidebar();

            if (coll === 'links') {
                document.getElementById('f-l-id').value = d.id; document.getElementById('f-l-title').value = d.data.title;
                document.getElementById('f-l-url').value = d.data.url; document.getElementById('f-l-icon').value = d.data.icon; document.getElementById('f-l-order').value = d.data.order;
            } else if (coll === 'articles') {
                document.getElementById('f-a-id').value = d.id; document.getElementById('f-a-title').value = d.data.title;
                document.getElementById('f-a-img').value = d.data.img; document.getElementById('f-a-desc').value = d.data.desc; document.getElementById('f-a-order').value = d.data.order;
            } else {
                document.getElementById('f-s-id').value = d.id; document.getElementById('f-s-name').value = d.data.name;
                document.getElementById('f-s-img').value = d.data.image; document.getElementById('f-s-cid').value = d.data.cid;
                document.getElementById('f-s-sec').value = d.data.sec; document.getElementById('f-s-note').value = d.data.note; document.getElementById('f-s-order').value = d.data.order;
            }
        }

        function drawTools(c, doc) {
            const s = encodeURIComponent(JSON.stringify({ id: doc.id, data: doc.data() }));
            return `<div class="admin-tools">
                <div class="tool-btn edit" onclick="editItem('${c}', '${s}')"><i class="fas fa-edit"></i></div>
                <div class="tool-btn del" onclick="delItem('${c}', '${doc.id}')"><i class="fas fa-trash"></i></div>
            </div>`;
        }

        async function delItem(coll, id) { if (confirm("حذف؟")) { await db.collection(coll).doc(id).delete(); showToast("تم الحذف"); refreshUI(); } }

        function handleLogin() {
            const user = document.getElementById('adm-user').value;
            const pass = document.getElementById('adm-pass').value;

            if (user === 'prog-admin' && pass === 'admin') {
                isLogged = true;
                localStorage.setItem('isAdmin', 'true'); // حفظ الحالة
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('cms-section').style.display = 'block';
                refreshUI();
                showToast("تم تسجيل الدخول");
            } else {
                showToast("خطأ في البيانات");
            }
        }

        function handleLogout() {
            localStorage.removeItem('isAdmin');
            location.reload();
        }

        function viewFull(t, m, d) {
            document.getElementById('modal-data').innerHTML = `
                <div class="media-wrap" style="height:350px">${renderMedia(m)}</div>
                <h2 style="margin:20px 0 15px">${t}</h2>
                <div id="modal-desc" style="white-space: pre-wrap; line-height: 1.8;">${decodeURIComponent(d)}</div>`;
            document.getElementById('article-modal').style.display = 'flex';
        }

        function toggleSidebar() {
            const side = document.getElementById('admin-sidebar');
            const over = document.getElementById('overlay');
            if (side && over) {
                side.classList.toggle('open');
                over.style.display = side.classList.contains('open') ? 'block' : 'none';
            }
        }

        function toggleAcc(id, forceOpen = false) {
            const el = document.getElementById(id);
            if (!el) return;
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.acc-body').forEach(b => b.style.display = 'none');
            if (forceOpen) el.style.display = 'block';
            else el.style.display = isVisible ? 'none' : 'block';
        }

        function closeModal() { document.getElementById('article-modal').style.display = 'none'; }
        function copyText(v) { navigator.clipboard.writeText(v); showToast("تم النسخ"); }
        function clearInputs() {
            document.querySelectorAll('.form-input').forEach(i => i.value = "");
            document.querySelectorAll('input[type="hidden"]').forEach(i => i.value = "");
        }

        // الوظيفة الأساسية عند تحميل الصفحة
        window.onload = () => {
            // 1. استعادة واجهة الإدارة إذا كان مسجلاً
            if (isLogged) {
                const loginSec = document.getElementById('login-section');
                const cmsSec = document.getElementById('cms-section');
                if (loginSec) loginSec.style.display = 'none';
                if (cmsSec) cmsSec.style.display = 'block';
            }

            // 2. تعيين البراند
            changeBrand('muthri');

            // 3. التعامل مع طلب التعديل القادم من صفحة الأرشيف
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'edit' && localStorage.getItem('editTarget')) {
                const dataStr = localStorage.getItem('editTarget');
                setTimeout(() => {
                    editItem('articles', dataStr);
                    localStorage.removeItem('editTarget'); // تنظيف
                    // تنظيف الرابط من البارامترات لمظهر أجمل
                    window.history.replaceState({}, document.title, window.location.pathname);
                }, 1000);
            }
        };
    </script>
</body>

</html>
