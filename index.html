<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muthri & Advaz | Professional CMS Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --muthri: #00ffa3;
            --advaz: #bd00ff;
            --accent: var(--muthri);
            --text: #f1f5f9;
            --dim: #94a3b8;
            --sidebar-w: 380px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 0.8rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-switcher {
            display: flex;
            background: #000;
            padding: 4px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .b-btn {
            border: none;
            background: none;
            color: var(--dim);
            padding: 8px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            font-size: 14px;
        }

        .b-btn.active.m {
            background: var(--muthri);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 163, 0.3);
        }

        .b-btn.active.a {
            background: var(--advaz);
            color: #fff;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.3);
        }

        /* Content Container */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .section-header {
            color: var(--accent);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* Responsive Grids */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        /* Card Styling */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .art-img-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .art-img-wrap img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .art-desc {
            color: var(--dim);
            font-size: 14px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            border: 1px solid transparent;
            transition: var(--transition);
            font-size: 14px;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .link-item img {
            width: 20px;
            height: 20px;
        }

        /* Sidebar Dashboard */
        #admin-sidebar {
            position: fixed;
            left: -100%;
            top: 0;
            width: var(--sidebar-w);
            height: 100%;
            background: #0a0f1d;
            z-index: 2000;
            transition: var(--transition);
            box-shadow: 25px 0 50px rgba(0, 0, 0, 0.7);
            overflow-y: auto;
        }

        #admin-sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 25px;
            background: #111827;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }

        .login-box {
            padding: 30px;
        }

        .cms-box {
            padding: 20px;
            display: none;
        }

        /* Accordion in Sidebar */
        .acc-group {
            margin-bottom: 10px;
            border: 1px solid #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }

        .acc-head {
            width: 100%;
            padding: 15px;
            background: #161b2c;
            border: none;
            color: #fff;
            text-align: right;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            font-family: inherit;
        }

        .acc-body {
            padding: 15px;
            display: none;
            background: #0f1422;
            border-top: 1px solid #1e293b;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 10px;
            outline: none;
            font-family: inherit;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* Article Popup (Modal) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #0f172a;
            max-width: 600px;
            width: 100%;
            border-radius: 25px;
            padding: 30px;
            border: 1px solid var(--accent);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Floating Admin Tools */
        .admin-tools {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 4px;
            z-index: 5;
        }

        .tool-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        .edit {
            color: #60a5fa;
        }

        .del {
            color: #f87171;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            :root {
                --sidebar-w: 100%;
            }

            .section-header {
                font-size: 1.2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="article-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i class="fas fa-times" onclick="closeModal(null)"
                style="position:absolute; top:20px; left:20px; cursor:pointer; opacity:0.6"></i>
            <div id="modal-data"></div>
        </div>
    </div>

    <nav>
        <div class="brand-switcher">
            <button class="b-btn active m" id="brand-muthri" onclick="changeBrand('muthri')">مُثري</button>
            <button class="b-btn a" id="brand-advaz" onclick="changeBrand('advaz')">أدفاز</button>
        </div>
        <button onclick="toggleSidebar()"
            style="background:rgba(255,255,255,0.05); border:1px solid var(--accent); color:var(--accent); padding:8px 18px; border-radius:50px; cursor:pointer; font-weight:700">
            <i class="fas fa-cog"></i> الإدارة
        </button>
    </nav>

    <div class="container">
        <div id="links-area">
            <h2 class="section-header"><i class="fas fa-link"></i> الروابط الرئيسية</h2>
            <div class="links-grid" id="links-container"></div>
        </div>

        <div id="articles-area">
            <h2 class="section-header" style="cursor:pointer" onclick="toggleVisibility('articles-container')">
                <i class="fas fa-newspaper"></i> المقالات المختارة <i class="fas fa-chevron-down"
                    style="font-size: 0.8rem; margin-right: auto;"></i>
            </h2>
            <div class="grid" id="articles-container" style="display:none"></div>
        </div>

        <div id="suppliers-area">
            <h2 class="section-header"><i class="fas fa-users-cog"></i> بوابة الموردين</h2>
            <div class="grid" id="suppliers-container"></div>
        </div>
    </div>

    <div id="admin-sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0">لوحة التحكم</h3>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer"></i>
        </div>

        <div id="login-section" class="login-box">
            <p style="color:var(--dim); font-size:14px">يرجى تسجيل الدخول للمتابعة</p>
            <input type="text" id="adm-user" class="form-input" placeholder="اسم المستخدم">
            <input type="password" id="adm-pass" class="form-input" placeholder="كلمة المرور">
            <button class="btn-save" onclick="handleLogin()">دخول النظام</button>
        </div>

        <div id="cms-section" class="cms-box">
            <div
                style="background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; margin-bottom:20px; font-size:13px">
                المحرر النشط: <b id="active-brand-label" style="color:var(--accent)">مُثري</b>
            </div>

            <div class="acc-group">
                <button class="acc-head" onclick="toggleAcc('acc-links')">إدارة الروابط <i
                        class="fas fa-chevron-down"></i></button>
                <div class="acc-body" id="acc-links">
                    <input type="hidden" id="f-l-id">
                    <input type="text" id="f-l-title" class="form-input" placeholder="اسم الموقع">
                    <input type="text" id="f-l-url" class="form-input" placeholder="الرابط (https://...)">
                    <input type="text" id="f-l-icon" class="form-input" placeholder="رابط الأيقونة">
                    <input type="number" id="f-l-order" class="form-input" placeholder="الترتيب (مثلاً: 1)">
                    <button class="btn-save" onclick="processSave('links')">حفظ الرابط</button>
                </div>
            </div>

            <div class="acc-group">
                <button class="acc-head" onclick="toggleAcc('acc-arts')">إضافة مقال <i
                        class="fas fa-chevron-down"></i></button>
                <div class="acc-body" id="acc-arts">
                    <input type="hidden" id="f-a-id">
                    <input type="text" id="f-a-title" class="form-input" placeholder="عنوان المقال">
                    <input type="text" id="f-a-img" class="form-input" placeholder="رابط صورة الغلاف">
                    <textarea id="f-a-desc" class="form-input" style="height:120px"
                        placeholder="محتوى المقال..."></textarea>
                    <input type="number" id="f-a-order" class="form-input" placeholder="الترتيب">
                    <button class="btn-save" onclick="processSave('articles')">نشر المقال</button>
                </div>
            </div>

            <div class="acc-group">
                <button class="acc-head" onclick="toggleAcc('acc-sups')">بيانات الموردين <i
                        class="fas fa-chevron-down"></i></button>
                <div class="acc-body" id="acc-sups">
                    <input type="hidden" id="f-s-id">
                    <input type="text" id="f-s-name" class="form-input" placeholder="اسم الشركة">
                    <input type="text" id="f-s-img" class="form-input" placeholder="رابط اللوجو">
                    <input type="text" id="f-s-cid" class="form-input" placeholder="Client ID">
                    <input type="text" id="f-s-sec" class="form-input" placeholder="Secret Key">
                    <textarea id="f-s-note" class="form-input" placeholder="ملاحظات المورد..."></textarea>
                    <input type="number" id="f-s-order" class="form-input" placeholder="الترتيب">
                    <button class="btn-save" onclick="processSave('suppliers')">حفظ المورد</button>
                </div>
            </div>

            <button onclick="handleLogout()"
                style="background:#ef444422; color:#ef4444; border:1px solid #ef4444; margin-top:30px"
                class="btn-save">خروج آمن</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyBMUqKSQwHBFEi3HCRhBm4cGa3wP2FUMMU",
            authDomain: "muthri-advaz-portal.firebaseapp.com",
            projectId: "muthri-advaz-portal",
            storageBucket: "muthri-advaz-portal.firebasestorage.app",
            messagingSenderId: "284717348325",
            appId: "1:284717348325:web:8ef1bac8ef9639ff34ab0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentBrand = 'muthri';
        let isLogged = false;

        // --- Brand Logic ---
        function changeBrand(brand) {
            currentBrand = brand;
            document.querySelectorAll('.b-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`brand-${brand}`).classList.add('active', brand === 'muthri' ? 'm' : 'a');
            document.documentElement.style.setProperty('--accent', brand === 'muthri' ? '#00ffa3' : '#bd00ff');
            document.getElementById('active-brand-label').innerText = brand === 'muthri' ? 'مُثري' : 'أدفاز';
            refreshUI();
        }

        // --- Main Render Function ---
        async function refreshUI() {
            const fetchCol = async (name) => {
                const snap = await db.collection(name).orderBy('order', 'asc').get();
                return snap.docs.filter(d => name === 'links' ? true : d.data().type === currentBrand);
            };

            // Render Links
            const links = await fetchCol('links');
            document.getElementById('links-container').innerHTML = links.map(doc => `
            <div style="position:relative">
                <a href="${doc.data().url}" target="_blank" class="link-item">
                    <img src="${doc.data().icon}"> ${doc.data().title}
                </a>
                ${isLogged ? drawTools('links', doc) : ''}
            </div>
        `).join('');

            // Render Articles
            const articles = await fetchCol('articles');
            document.getElementById('articles-container').innerHTML = articles.map(doc => {
                const d = doc.data();
                return `
            <div class="card">
                ${isLogged ? drawTools('articles', doc) : ''}
                <div class="art-img-wrap"><img src="${d.img}"></div>
                <h3 style="margin:0 0 10px; font-size:1.1rem">${d.title}</h3>
                <p class="art-desc">${d.desc}</p>
                <button onclick="viewFull('${d.title}', '${d.img}', '${encodeURIComponent(d.desc)}')" style="background:none; border:none; color:var(--accent); font-weight:700; cursor:pointer; font-family:inherit">قراءة المزيد...</button>
            </div>`;
            }).join('');

            // Render Suppliers
            const suppliers = await fetchCol('suppliers');
            document.getElementById('suppliers-container').innerHTML = suppliers.map(doc => {
                const d = doc.data();
                return `
            <div class="card">
                ${isLogged ? drawTools('suppliers', doc) : ''}
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px">
                    <img src="${d.image}" style="width:45px; height:45px; border-radius:10px; object-fit:cover">
                    <h3 style="margin:0">${d.name}</h3>
                </div>
                <div style="font-size:10px; color:var(--dim); margin-bottom:4px">CLIENT ID</div>
                <div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; font-family:monospace">
                    <span style="font-size:13px">${d.cid}</span>
                    <i class="far fa-copy" style="cursor:pointer; color:var(--accent)" onclick="copyToClipboard('${d.cid}')"></i>
                </div>
                ${d.note ? `<div style="margin-top:12px; padding:10px; background:rgba(255,255,255,0.02); border-right:3px solid var(--accent); border-radius:8px; font-size:13px; color:var(--dim)">${d.note}</div>` : ''}
            </div>`;
            }).join('');
        }

        // --- Sidebar & Auth ---
        function toggleSidebar() { document.getElementById('admin-sidebar').classList.toggle('open'); }

        function handleLogin() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if (u === 'prog-admin' && p === 'admin') {
                isLogged = true;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('cms-section').style.display = 'block';
                refreshUI();
            } else { alert("خطأ في البيانات!"); }
        }

        function handleLogout() { isLogged = false; location.reload(); }

        // --- CMS Logic ---
        async function processSave(coll) {
            let payload = { type: currentBrand, order: 0 };
            let docId = "";

            if (coll === 'links') {
                docId = document.getElementById('f-l-id').value;
                payload = { title: document.getElementById('f-l-title').value, url: document.getElementById('f-l-url').value, icon: document.getElementById('f-l-icon').value, order: Number(document.getElementById('f-l-order').value) };
            } else if (coll === 'articles') {
                docId = document.getElementById('f-a-id').value;
                payload = { ...payload, title: document.getElementById('f-a-title').value, img: document.getElementById('f-a-img').value, desc: document.getElementById('f-a-desc').value, order: Number(document.getElementById('f-a-order').value) };
            } else if (coll === 'suppliers') {
                docId = document.getElementById('f-s-id').value;
                payload = { ...payload, name: document.getElementById('f-s-name').value, image: document.getElementById('f-s-img').value, cid: document.getElementById('f-s-cid').value, sec: document.getElementById('f-s-sec').value, note: document.getElementById('f-s-note').value, order: Number(document.getElementById('f-s-order').value) };
            }

            if (docId) { await db.collection(coll).doc(docId).update(payload); }
            else { await db.collection(coll).add(payload); }

            alert("تم الحفظ بنجاح!");
            clearInputs();
            toggleSidebar();
            refreshUI();
        }

        function editItem(coll, dataStr) {
            const d = JSON.parse(decodeURIComponent(dataStr));
            toggleAcc(coll === 'links' ? 'acc-links' : coll === 'articles' ? 'acc-arts' : 'acc-sups', true);

            if (coll === 'links') {
                document.getElementById('f-l-id').value = d.id;
                document.getElementById('f-l-title').value = d.data.title;
                document.getElementById('f-l-url').value = d.data.url;
                document.getElementById('f-l-icon').value = d.data.icon;
                document.getElementById('f-l-order').value = d.data.order;
            } else if (coll === 'articles') {
                document.getElementById('f-a-id').value = d.id;
                document.getElementById('f-a-title').value = d.data.title;
                document.getElementById('f-a-img').value = d.data.img;
                document.getElementById('f-a-desc').value = d.data.desc;
                document.getElementById('f-a-order').value = d.data.order;
            } else if (coll === 'suppliers') {
                document.getElementById('f-s-id').value = d.id;
                document.getElementById('f-s-name').value = d.data.name;
                document.getElementById('f-s-img').value = d.data.image;
                document.getElementById('f-s-cid').value = d.data.cid;
                document.getElementById('f-s-sec').value = d.data.sec;
                document.getElementById('f-s-note').value = d.data.note;
                document.getElementById('f-s-order').value = d.data.order;
            }
            toggleSidebar();
        }

        async function deleteItem(coll, id) {
            if (confirm("سيتم حذف العنصر نهائياً، هل أنت متأكد؟")) {
                await db.collection(coll).doc(id).delete();
                refreshUI();
            }
        }

        // --- Helpers ---
        function drawTools(coll, doc) {
            const obj = encodeURIComponent(JSON.stringify({ id: doc.id, data: doc.data() }));
            return `
        <div class="admin-tools">
            <div class="tool-btn edit" onclick="editItem('${coll}', '${obj}')"><i class="fas fa-pen"></i></div>
            <div class="tool-btn del" onclick="deleteItem('${coll}', '${doc.id}')"><i class="fas fa-trash"></i></div>
        </div>`;
        }

        function toggleAcc(id, openOnly = false) {
            const target = document.getElementById(id);
            const state = target.style.display === 'block';
            document.querySelectorAll('.acc-body').forEach(b => b.style.display = 'none');
            target.style.display = (state && !openOnly) ? 'none' : 'block';
        }

        function viewFull(title, img, desc) {
            document.getElementById('modal-data').innerHTML = `
            <img src="${img}" style="width:100%; border-radius:15px; margin-bottom:20px">
            <h2 style="margin:0 0 15px">${title}</h2>
            <div style="line-height:1.8; color:var(--dim)">${decodeURIComponent(desc)}</div>
        `;
            document.getElementById('article-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('article-modal').style.display = 'none'; }
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'none' ? 'grid' : 'none';
        }
        function copyToClipboard(val) { navigator.clipboard.writeText(val); alert("تم النسخ!"); }
        function clearInputs() {
            document.querySelectorAll('.form-input').forEach(i => i.value = "");
            document.querySelectorAll('input[type="hidden"]').forEach(i => i.value = "");
        }

        window.onload = () => changeBrand('muthri');
    </script>
</body>

</html>
