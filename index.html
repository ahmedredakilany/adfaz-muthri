<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muthri & Advaz | Premium Portal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Tajawal:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #050810;
            --card-glass: rgba(17, 25, 40, 0.75);
            --muthri-primary: #00ffa3;
            --muthri-glow: rgba(0, 255, 163, 0.2);
            --advaz-primary: #bd00ff;
            --advaz-glow: rgba(189, 0, 255, 0.2);
            --accent: var(--muthri-primary);
            --accent-glow: var(--muthri-glow);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition-swift: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient Background Shadows */
        .ambient-bg {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, var(--accent-glow), transparent 40%);
            transition: var(--transition-swift);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%);
            }

            to {
                transform: translate(20%, 20%);
            }
        }

        /* Navigation Bar */
        nav {
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-pill {
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            display: flex;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-btn {
            border: none;
            background: none;
            color: var(--text-dim);
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: var(--transition-swift);
        }

        .brand-btn.active[data-b="muthri"] {
            background: var(--muthri-primary);
            color: #000;
            box-shadow: 0 4px 20px var(--muthri-glow);
        }

        .brand-btn.active[data-b="advaz"] {
            background: var(--advaz-primary);
            color: #fff;
            box-shadow: 0 4px 20px var(--advaz-glow);
        }

        /* Global UI Elements */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        /* Optimized Grid Layouts */
        .grid-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Glass Cards Styling */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            transition: var(--transition-swift);
            animation: fadeIn 0.6s ease backwards;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        /* Links Card */
        .link-pill {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .link-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .link-pill img {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        /* Supplier Styling */
        .sup-head {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 25px;
        }

        .sup-head img {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .field-group {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .field-group label {
            display: block;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .field-group input {
            background: none;
            border: none;
            color: #fff;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            padding-right: 30px;
        }

        .action-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
        }

        .action-icon:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.2);
        }

        .note-tag {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-dim);
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            margin-top: 15px;
            border-right: 4px solid var(--accent);
        }

        /* Admin UI */
        #drawer {
            position: fixed;
            left: -400px;
            top: 0;
            width: 380px;
            height: 100%;
            background: #0d111a;
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 40px 30px;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.8);
        }

        #drawer.open {
            left: 0;
        }

        .admin-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #161b2c;
            border: 1px solid #2d3748;
            color: #fff;
            border-radius: 12px;
            font-family: inherit;
        }

        .primary-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 20px var(--accent-glow);
            transition: 0.3s;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--accent-glow);
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.5s;
            z-index: 9999;
        }

        .trash-box {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ff4d4d;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="ambient-bg"></div>
    <div class="blob"></div>

    <div id="toast">تم النسخ بنجاح!</div>

    <nav>
        <div class="brand-pill">
            <button class="brand-btn active" data-b="muthri" onclick="changeTheme('muthri')">مُـثـري</button>
            <button class="brand-btn" data-b="advaz" onclick="changeTheme('advaz')">أدفـاز</button>
        </div>
        <button onclick="toggleAdmin()"
            style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:10px 20px; border-radius:14px; cursor:pointer">
            <i class="fas fa-shield-halved"></i>
        </button>
    </nav>

    <div class="container">
        <h2 class="section-title"><i class="fas fa-bolt"></i> روابط سريعة</h2>
        <div class="grid-links" id="links-list"></div>

        <div style="margin-top: 60px;">
            <h2 class="section-title" style="cursor:pointer" onclick="toggleDiv('articles-list')">
                <i class="fas fa-layer-group"></i> مكتبة المحتوى <i class="fas fa-chevron-down"
                    style="font-size:0.8rem; margin-right:auto"></i>
            </h2>
            <div class="grid-cards" id="articles-list" style="display: none;"></div>
        </div>

        <div style="margin-top: 60px;">
            <h2 class="section-title"><i class="fas fa-store"></i> شركاء النجاح</h2>
            <div class="grid-cards" id="suppliers-list"></div>
        </div>
    </div>

    <div id="drawer">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:40px">
            <h2 style="margin:0">لوحة التحكم</h2>
            <i class="fas fa-times-circle" onclick="toggleAdmin()"
                style="cursor:pointer; font-size:24px; opacity:0.5"></i>
        </div>

        <div id="login-zone">
            <input type="text" id="user" class="admin-input" placeholder="اسم المستخدم">
            <input type="password" id="pass" class="admin-input" placeholder="كلمة المرور">
            <button class="primary-btn" onclick="login()">دخول آمن</button>
        </div>

        <div id="admin-zone" style="display:none">
            <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; margin-bottom:20px">
                <p style="margin:0; font-size:14px">أهلاً بك <b>prog-admin</b></p>
                <p style="margin:5px 0 0; font-size:12px; color:var(--accent)">الوضع الحالي: <span
                        id="cur-b">Muthri</span></p>
            </div>

            <div style="max-height: 60vh; overflow-y: auto; padding-left: 10px;">
                <h4 style="border-bottom: 1px solid #333; padding-bottom: 10px;">إضافة مورد</h4>
                <input type="text" id="s-n" class="admin-input" placeholder="اسم الشركة">
                <input type="text" id="s-i" class="admin-input" placeholder="رابط الشعار">
                <input type="text" id="s-id" class="admin-input" placeholder="Client ID">
                <input type="text" id="s-s" class="admin-input" placeholder="Secret Key">
                <textarea id="s-nt" class="admin-input" placeholder="ملاحظات المورد..."></textarea>
                <button class="primary-btn" onclick="saveData('suppliers')">حفظ المورد</button>

                <h4 style="margin-top:30px; border-bottom: 1px solid #333; padding-bottom: 10px;">إضافة رابط</h4>
                <input type="text" id="l-t" class="admin-input" placeholder="عنوان الرابط">
                <input type="text" id="l-u" class="admin-input" placeholder="URL">
                <input type="text" id="l-i" class="admin-input" placeholder="رابط الأيقونة (PNG)">
                <button class="primary-btn" onclick="saveData('links')">تحديث الروابط</button>

                <h4 style="margin-top:30px; border-bottom: 1px solid #333; padding-bottom: 10px;">إضافة مقال</h4>
                <input type="text" id="a-t" class="admin-input" placeholder="العنوان الرئيسي">
                <input type="text" id="a-i" class="admin-input" placeholder="رابط صورة الغلاف">
                <textarea id="a-d" class="admin-input" style="height:100px" placeholder="نص المقال..."></textarea>
                <button class="primary-btn" onclick="saveData('articles')">نشر الآن</button>
            </div>

            <button onclick="logout()"
                style="margin-top:30px; background:#ef444422; color:#ef4444; border:1px solid #ef4444"
                class="primary-btn">خروج</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBMUqKSQwHBFEi3HCRhBm4cGa3wP2FUMMU",
            authDomain: "muthri-advaz-portal.firebaseapp.com",
            projectId: "muthri-advaz-portal",
            storageBucket: "muthri-advaz-portal.firebasestorage.app",
            messagingSenderId: "284717348325",
            appId: "1:284717348325:web:8ef1bac8ef9639ff34ab0c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentBrand = 'muthri';
        let loggedIn = false;

        function changeTheme(b) {
            currentBrand = b;
            document.querySelectorAll('.brand-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-b="${b}"]`).classList.add('active');

            const color = b === 'muthri' ? '#00ffa3' : '#bd00ff';
            const glow = b === 'muthri' ? 'rgba(0, 255, 163, 0.2)' : 'rgba(189, 0, 255, 0.2)';

            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', glow);
            document.getElementById('cur-b').innerText = b.toUpperCase();
            loadContent();
        }

        async function loadContent() {
            // Load Links
            const lSnap = await db.collection('links').get();
            document.getElementById('links-list').innerHTML = lSnap.docs.map((doc, i) => `
                <div style="position:relative; animation-delay: ${i * 0.1}s" class="glass-card link-pill">
                    <img src="${doc.data().icon || 'https://cdn-icons-png.flaticon.com/512/1243/1243933.png'}">
                    <a href="${doc.data().url}" target="_blank" style="color:#fff; text-decoration:none; font-weight:700">${doc.data().title}</a>
                    ${loggedIn ? `<i class="fas fa-trash-alt trash-box" onclick="deleteDoc('links','${doc.id}')"></i>` : ''}
                </div>
            `).join('');

            // Load Suppliers
            const sSnap = await db.collection('suppliers').where('type', '==', currentBrand).get();
            document.getElementById('suppliers-list').innerHTML = sSnap.docs.map((doc, i) => {
                const d = doc.data();
                return `
                <div class="glass-card" style="animation-delay: ${i * 0.1}s">
                    ${loggedIn ? `<i class="fas fa-trash-alt trash-box" onclick="deleteDoc('suppliers','${doc.id}')"></i>` : ''}
                    <div class="sup-head">
                        <img src="${d.image}">
                        <h3 style="margin:0; font-size:1.2rem">${d.name}</h3>
                    </div>
                    <div class="field-group">
                        <label>Client ID</label>
                        <input type="text" value="${d.cid}" readonly>
                        <i class="far fa-copy action-icon" onclick="copyValue('${d.cid}')"></i>
                    </div>
                    <div class="field-group">
                        <label>Secret Key</label>
                        <input type="password" value="${d.sec}" readonly>
                        <i class="far fa-eye action-icon" style="left:45px" onclick="togglePass(this)"></i>
                        <i class="far fa-copy action-icon" onclick="copyValue('${d.sec}')"></i>
                    </div>
                    ${d.note ? `<div class="note-tag"><b>ملاحظة:</b> ${d.note}</div>` : ''}
                </div>`;
            }).join('');

            // Load Articles
            const aSnap = await db.collection('articles').where('type', '==', currentBrand).get();
            document.getElementById('articles-list').innerHTML = aSnap.docs.map((doc, i) => {
                const d = doc.data();
                return `
                <div class="glass-card" style="animation-delay: ${i * 0.1}s">
                    ${loggedIn ? `<i class="fas fa-trash-alt trash-box" onclick="deleteDoc('articles','${doc.id}')"></i>` : ''}
                    <img src="${d.img}" style="height:180px; margin-bottom:15px">
                    <h4 style="margin:10px 0">${d.title}</h4>
                    <p class="article-desc">${d.desc}</p>
                </div>`;
            }).join('');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.bottom = '30px';
            setTimeout(() => t.style.bottom = '-100px', 3000);
        }

        function copyValue(val) {
            navigator.clipboard.writeText(val);
            showToast("تم نسخ الرمز بنجاح ✅");
        }

        function togglePass(el) {
            const inp = el.parentElement.querySelector('input');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            el.classList.toggle('fa-eye-slash');
        }

        function toggleAdmin() { document.getElementById('drawer').classList.toggle('open'); }

        function login() {
            if (document.getElementById('user').value === 'prog-admin' && document.getElementById('pass').value === 'admin') {
                loggedIn = true;
                document.getElementById('login-zone').style.display = 'none';
                document.getElementById('admin-zone').style.display = 'block';
                showToast("مرحباً أيها المدير 🛡️");
                loadContent();
            } else { showToast("عذراً، البيانات خاطئة ❌"); }
        }

        async function saveData(coll) {
            let data = { type: currentBrand };
            if (coll === 'suppliers') {
                data = { ...data, name: document.getElementById('s-n').value, image: document.getElementById('s-i').value, cid: document.getElementById('s-id').value, sec: document.getElementById('s-s').value, note: document.getElementById('s-nt').value };
            } else if (coll === 'links') {
                data = { title: document.getElementById('l-t').value, url: document.getElementById('l-u').value, icon: document.getElementById('l-i').value };
            } else if (coll === 'articles') {
                data = { ...data, title: document.getElementById('a-t').value, img: document.getElementById('a-i').value, desc: document.getElementById('a-d').value };
            }
            await db.collection(coll).add(data);
            showToast("تم الحفظ بنجاح ✨");
            loadContent();
        }

        async function deleteDoc(coll, id) {
            if (confirm("هل تريد حذف هذا العنصر نهائياً؟")) {
                await db.collection(coll).doc(id).delete();
                loadContent();
            }
        }

        function toggleDiv(id) {
            const d = document.getElementById(id);
            d.style.display = d.style.display === 'none' ? 'grid' : 'none';
        }

        window.onload = () => changeTheme('muthri');
    </script>
</body>

</html>
